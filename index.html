<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Full-Stack App</title>
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="not-authenticated">

  <!-- ===================== NAVBAR ===================== -->
  <nav class="navbar navbar-dark bg-dark px-4">
    <a class="navbar-brand" href="#/">Full-Stack App</a>
    <div class="d-flex align-items-center gap-3">

      <!-- Visible only when NOT logged in -->
      <a href="#/login"    class="text-light text-decoration-none role-logged-out">Login</a>
      <a href="#/register" class="text-light text-decoration-none role-logged-out">Register</a>

      <!-- Visible only when logged in -->
      <div class="dropdown role-logged-in">
        <a class="text-light text-decoration-none dropdown-toggle" href="#"
           id="userDropdown" data-bs-toggle="dropdown" aria-expanded="false">
          <i class="bi bi-person-circle me-1"></i>
          <span class="user-name">User</span>
        </a>
        <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="userDropdown">
          <li><a class="dropdown-item" href="#/profile">
            <i class="bi bi-person me-2"></i>Profile
          </a></li>
          <!-- Admin-only links -->
          <li><a class="dropdown-item role-admin" href="#/employees">
            <i class="bi bi-people me-2"></i>Employees
          </a></li>
          <li><a class="dropdown-item role-admin" href="#/accounts">
            <i class="bi bi-person-badge me-2"></i>Accounts
          </a></li>
          <li><a class="dropdown-item role-admin" href="#/departments">
            <i class="bi bi-building me-2"></i>Departments
          </a></li>
          <li><a class="dropdown-item" href="#/requests">
            <i class="bi bi-clipboard-check me-2"></i>My Requests
          </a></li>
          <li><hr class="dropdown-divider" /></li>
          <li>
            <a class="dropdown-item text-danger" href="#" id="btn-logout">
              <i class="bi bi-box-arrow-right me-2"></i>Logout
            </a>
          </li>
        </ul>
      </div>

    </div>
  </nav>

  <!-- ===================== MAIN ===================== -->
  <!-- script.js renders all page content into this div -->
  <main class="container mt-4" id="app-content">
    <!-- Dynamic content injected here by script.js -->
  </main>

  <!-- ===================== MODALS ===================== -->
  <!-- script.js injects modal HTML here dynamically -->
  <div id="modals-container"></div>

  <!-- Bootstrap 5 JS Bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
